version: "3.9"

services:
  neuro-api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - MODEL_VERSION=v1
      - SEIZURE_THRESHOLD=0.5
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
